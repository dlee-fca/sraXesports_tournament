<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered Players — SRA Tournament</title>
<link rel="stylesheet" href="style.css">
<style>
  .page-header { padding: 48px 0 0; margin-bottom: 36px; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    line-height: 0.9;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .page-title span { color: var(--purple); }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-top: 3px solid var(--purple);
    padding: 16px 24px;
    min-width: 120px;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--white);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Search / filter */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom: 2px solid var(--purple-dark);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 16px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--purple); }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.2); }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  .filter-select {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-bottom: 2px solid var(--purple-dark);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 10px 32px 10px 14px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--purple-light);
    pointer-events: none;
  }

  /* Table */
  .table-wrap {
    border: 1px solid var(--card-border);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--card);
    border-bottom: 2px solid var(--purple);
  }

  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--purple-light);
    padding: 14px 20px;
    text-align: left;
  }

  tbody tr {
    border-bottom: 1px solid var(--card-border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(124,58,237,0.05); }

  tbody td {
    padding: 14px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  .player-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--purple);
    width: 40px;
  }

  .grade-badge {
    display: inline-block;
    background: #110d1e;
    border: 1px solid var(--card-border);
    padding: 2px 8px;
    font-size: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .game-chip {
    display: inline-block;
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--purple-light);
    font-size: 11px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    padding: 2px 8px;
    margin: 2px 2px 2px 0;
  }

  /* Loading / empty states */
  .state-box {
    padding: 60px 20px;
    text-align: center;
    background: var(--card);
    border: 1px solid var(--card-border);
  }

  .state-box .icon {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
  }

  .state-box p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--card-border);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-left: auto;
    display: block;
    margin-bottom: 12px;
  }

  .refresh-btn:hover { border-color: var(--purple); color: var(--white); }

  .last-updated {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.15);
    text-align: right;
    margin-top: 10px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 2px solid var(--card-border);
  }

  .tab-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab-btn:hover { color: var(--white); }

  .tab-btn.active {
    color: var(--purple-light);
    border-bottom-color: var(--purple);
  }

  .rep-badge {
    display: inline-block;
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.3);
    color: var(--purple-light);
    font-size: 11px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    padding: 3px 10px;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SRA <span>×</span> ESPORTS</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="players.html" class="active">Players</a>
    <a href="signup.html" class="cta">Sign Up</a>
  </div>
</nav>

<div class="container">

  <div class="page-header fade-up">
    <div class="presents-tag">Student Repair Academy Presents</div>
    <div class="page-title">Registered <span>Players</span></div>
  </div>

  <!-- Stats -->
  <div class="stats-row fade-up-2">
    <div class="stat-box">
      <div class="stat-num" id="confirmed-count">--</div>
      <div class="stat-label">Confirmed</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="pending-count">--</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="grade-count">--</div>
      <div class="stat-label">Grades</div>
    </div>
  </div>

  <div class="divider fade-up-2"></div>

  <!-- Tabs -->
  <div class="tabs fade-up-3">
    <button class="tab-btn active" id="tab-confirmed" onclick="switchTab('confirmed')">
      ✓ Confirmed Players
    </button>
    <button class="tab-btn" id="tab-pending" onclick="switchTab('pending')">
      ⏳ Pending Review
    </button>
  </div>

  <!-- Controls -->
  <div class="controls fade-up-3">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search by name..." oninput="filterTable()">
    </div>
    <div class="select-wrap">
      <select class="filter-select" id="gradeFilter" onchange="filterTable()">
        <option value="">All Grades</option>
        <option value="9">9th Grade</option>
        <option value="10">10th Grade</option>
        <option value="11">11th Grade</option>
        <option value="12">12th Grade</option>
      </select>
    </div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>

  <!-- Table -->
  <div id="content" class="fade-up-3">
    <div class="state-box" id="loadingState">
      <div class="spinner"></div>
      <p>Loading players...</p>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

</div>

<footer class="site-footer">
  Student Repair Academy · Foundation Collegiate Academy Esports League · 2025–26
</footer>

<script>
  const SHEET_ID = '13v4vQWtfI6nMvqL5BgqqOWVer8HJgDAQBhRl760uthE';

  const SHEETS = {
    pending: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Form%20Responses%201`,
    confirmed: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Confirmed%20Players`
  };

  let allPending = [];
  let allConfirmed = [];
  let currentTab = 'confirmed';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-confirmed').classList.toggle('active', tab === 'confirmed');
    document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
    document.getElementById('searchInput').value = '';
    document.getElementById('gradeFilter').value = '';
    renderTable(tab === 'confirmed' ? allConfirmed : allPending, tab);
  }

  async function fetchSheet(url, type) {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows || [];

    if (type === 'confirmed') {
      // cols: 0=Full Name, 1=Grade, 2=Representing
      return rows.map((row, i) => ({
        num: i + 1,
        name: row.c[0]?.v || '—',
        grade: row.c[1]?.v || '—',
        representing: row.c[2]?.v || '—'
      }));
    } else {
      // cols: 0=Timestamp, 1=Full Name, 2=Grade, 3=Teacher, 4=Game Preference
      return rows.map((row, i) => ({
        num: i + 1,
        name: row.c[1]?.v || '—',
        grade: row.c[2]?.v || '—',
        games: row.c[4]?.v || '—'
      }));
    }
  }

  async function loadAll() {
    document.getElementById('content').innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <p>Loading players...</p>
      </div>`;

    try {
      [allConfirmed, allPending] = await Promise.all([
        fetchSheet(SHEETS.confirmed, 'confirmed'),
        fetchSheet(SHEETS.pending, 'pending')
      ]);

      updateStats();
      renderTable(currentTab === 'confirmed' ? allConfirmed : allPending, currentTab);

      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        `Last updated: ${now.toLocaleTimeString()}`;
    } catch(e) {
      document.getElementById('content').innerHTML = `
        <div class="state-box">
          <span class="icon">⚠️</span>
          <p>Couldn't load players. Make sure the sheet is public.</p>
        </div>`;
    }
  }

  function renderTable(players, type) {
    if (!players || players.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="state-box">
          <span class="icon">${type === 'confirmed' ? '🏆' : '🎮'}</span>
          <p>${type === 'confirmed' ? 'No confirmed players yet.' : 'No pending registrations.'}</p>
        </div>`;
      return;
    }

    let headers, rows;

    if (type === 'confirmed') {
      headers = `<th>#</th><th>Name</th><th>Grade</th><th>Representing</th>`;
      rows = players.map(p => `
        <tr>
          <td class="player-num">${String(p.num).padStart(2,'0')}</td>
          <td>${p.name}</td>
          <td><span class="grade-badge">${p.grade}th</span></td>
          <td><span class="rep-badge">${p.representing}</span></td>
        </tr>`).join('');
    } else {
      headers = `<th>#</th><th>Name</th><th>Grade</th><th>Game Preference</th>`;
      rows = players.map(p => {
        const games = p.games.split(',').map(g => g.trim()).filter(Boolean);
        const chips = games.map(g => `<span class="game-chip">${g}</span>`).join('');
        return `
        <tr>
          <td class="player-num">${String(p.num).padStart(2,'0')}</td>
          <td>${p.name}</td>
          <td><span class="grade-badge">${p.grade}th</span></td>
          <td>${chips}</td>
        </tr>`;
      }).join('');
    }

    document.getElementById('content').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr>${headers}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function filterTable() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const grade = document.getElementById('gradeFilter').value;
    const source = currentTab === 'confirmed' ? allConfirmed : allPending;

    const filtered = source.filter(p => {
      const matchSearch = !search || p.name.toLowerCase().includes(search);
      const matchGrade = !grade || String(p.grade) === grade;
      return matchSearch && matchGrade;
    });

    renderTable(filtered, currentTab);
  }

  function updateStats() {
    document.getElementById('confirmed-count').textContent =
      String(allConfirmed.length).padStart(2, '0');
    document.getElementById('pending-count').textContent =
      String(allPending.length).padStart(2, '0');
    const grades = new Set([...allConfirmed, ...allPending].map(p => p.grade));
    document.getElementById('grade-count').textContent =
      String(grades.size).padStart(2, '0');
  }

  loadAll();
  setInterval(loadAll, 60000);
</script>
</body>
</html>
